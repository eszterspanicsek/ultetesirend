<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ültetési rend admin</title>
  <script src="data.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <style>
    :root {
      --bg: #f7f0ea;
      --surface: #fffaf6;
      --primary: #b68663;
      --primary-dark: #94684a;
      --text: #3e3028;
      --border: #e8d7ca;
      --ok: #2f7d4f;
      --warn: #8a5b3b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; color: var(--text); background: #f4ede7; }
    .wrap { display: grid; grid-template-columns: minmax(360px, 560px) 1fr; min-height: 100vh; }
    .panel { background: #fbf7f3; padding: 24px; border-right: 1px solid var(--border); overflow: auto; }
    .preview { min-height: 100vh; background: #efe4db; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p.top { margin: 0 0 18px; line-height: 1.5; color: #6a5649; }
    .section { background: #fffaf6; border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 16px; }
    .section h2 { margin: 0 0 14px; font-size: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .full { grid-column: 1 / -1; }
    label { display: block; font-weight: 700; margin-bottom: 6px; color: #7a563f; }
    input[type="text"], textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; font-size: 16px; background: white;
    }
    textarea { min-height: 96px; resize: vertical; }
    input[type="color"] { width: 100%; height: 46px; border: 1px solid var(--border); border-radius: 14px; background: white; padding: 6px; }
    input[type="file"] { width: 100%; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
    button { border: 0; border-radius: 14px; padding: 12px 16px; cursor: pointer; font-size: 15px; font-weight: 700; background: var(--primary); color: white; }
    button.secondary { background: #ead8ca; color: #5b4335; }
    button.ghost { background: white; color: #6a4b37; border: 1px solid var(--border); }
    .status { display: none; margin-bottom: 14px; padding: 12px 14px; border-radius: 14px; font-weight: 700; }
    .status.show { display: block; }
    .status.ok { background: #e8f6ed; color: var(--ok); border: 1px solid #bfe2c9; }
    .status.warn { background: #fff3e7; color: var(--warn); border: 1px solid #f1d3b3; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px 6px; border-bottom: 1px solid #eee1d6; text-align: left; vertical-align: top; }
    .guest-name, .guest-table { width: 100%; }
    .guest-actions button { padding: 9px 11px; font-size: 13px; }
    iframe { width: 100%; min-height: 100vh; border: 0; display: block; background: white; }
    .file-meta { margin-top: 8px; font-size: 14px; color: #6d5a4d; }
    .file-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .preview { min-height: 620px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Esküvői ültetési rend – admin</h1>
      <p class="top">Itt tudod átírni a szövegeket, színeket, a vendéglistát és feltöltheted a PDF-eket is. A Mentés után a jobb oldali előnézet azonnal frissül ugyanebben az ablakban.</p>
      <div id="status" class="status"></div>

      <div class="section">
        <h2>Szövegek</h2>
        <div class="grid">
          <div><label>Pár neve</label><input type="text" id="coupleName"></div>
          <div><label>Dátum</label><input type="text" id="date"></div>
          <div><label>Helyszín</label><input type="text" id="venue"></div>
          <div><label>Kis felső címke</label><input type="text" id="eyebrow"></div>
          <div class="full"><label>Főcím</label><input type="text" id="title"></div>
          <div class="full"><label>Leírás</label><textarea id="description"></textarea></div>
          <div><label>Kereső mező helyőrző</label><input type="text" id="searchPlaceholder"></div>
          <div><label>Kereső gomb szövege</label><input type="text" id="searchButton"></div>
          <div><label>Eredmény címke</label><input type="text" id="resultLabel"></div>
          <div><label>Nincs találat cím</label><input type="text" id="notFoundTitle"></div>
          <div class="full"><label>Nincs találat szöveg</label><textarea id="notFoundText"></textarea></div>
          <div class="full"><label>Lábléc</label><input type="text" id="footer"></div>
        </div>
      </div>

      <div class="section">
        <h2>PDF-ek</h2>
        <div class="grid">
          <div class="full">
            <label for="menuPdf">Menü PDF</label>
            <div class="file-row">
              <input type="file" id="menuPdf" accept="application/pdf">
              <button type="button" class="ghost" data-clear-doc="menu">Törlés</button>
            </div>
            <div class="file-meta" id="menuPdfMeta">Nincs feltöltve.</div>
          </div>
          <div class="full">
            <label for="drinksPdf">Itallap PDF</label>
            <div class="file-row">
              <input type="file" id="drinksPdf" accept="application/pdf">
              <button type="button" class="ghost" data-clear-doc="drinks">Törlés</button>
            </div>
            <div class="file-meta" id="drinksPdfMeta">Nincs feltöltve.</div>
          </div>
          <div class="full">
            <label for="cocktailsPdf">Koktéllap PDF</label>
            <div class="file-row">
              <input type="file" id="cocktailsPdf" accept="application/pdf">
              <button type="button" class="ghost" data-clear-doc="cocktails">Törlés</button>
            </div>
            <div class="file-meta" id="cocktailsPdfMeta">Nincs feltöltve.</div>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Színek</h2>
        <div class="grid">
          <div><label>Háttér</label><input type="color" id="bg"></div>
          <div><label>Kártya háttér</label><input type="color" id="surface"></div>
          <div><label>Fő kiemelő</label><input type="color" id="primary"></div>
          <div><label>Sötétebb kiemelő</label><input type="color" id="primaryDark"></div>
          <div><label>Szöveg</label><input type="color" id="text"></div>
          <div><label>Szegély</label><input type="color" id="border"></div>
        </div>
      </div>

      <div class="section">
        <h2>Vendéglista</h2>
        <div class="toolbar">
          <button type="button" class="secondary" id="addGuestBtn">+ Új vendég</button>
          <button type="button" class="ghost" id="loadSampleBtn">Mintaadatok visszaállítása</button>
        </div>
        <table>
          <thead><tr><th>Név</th><th>Asztal</th><th></th></tr></thead>
          <tbody id="guestRows"></tbody>
        </table>
      </div>

      <div class="toolbar">
        <button type="button" id="saveBtn">Mentés</button>
        <button type="button" class="secondary" id="downloadDataBtn">data.js letöltése</button>
        <button type="button" class="ghost" id="downloadGuestBtn">Kész vendégoldal letöltése</button>
      </div>
    </div>

    <div class="preview">
      <iframe id="previewFrame" title="Vendégoldal előnézet"></iframe>
    </div>
  </div>

<script type="module">
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

  const DEFAULT_DATA = normalizeData(JSON.parse(JSON.stringify(window.WEDDING_APP_DATA)));
  function defaultDocuments() {
    return {
      menu: { title: 'Menü', description: '', fileName: '', dataUrl: '', pageImages: [] },
      drinks: { title: 'Itallap', description: '', fileName: '', dataUrl: '', pageImages: [] },
      cocktails: { title: 'Koktéllap', description: '', fileName: '', dataUrl: '', pageImages: [] }
    };
  }
  function normalizeData(data) {
    if (!data.documents) data.documents = defaultDocuments();
    const defs = defaultDocuments();
    Object.keys(defs).forEach(key => {
      data.documents[key] = Object.assign({}, defs[key], data.documents[key] || {});
      if (!Array.isArray(data.documents[key].pageImages)) data.documents[key].pageImages = [];
    });
    return data;
  }
  function getStoredData() {
    const local = localStorage.getItem('weddingSeatingDataV8');
    if (local) {
      try { return normalizeData(JSON.parse(local)); } catch (e) {}
    }
    return normalizeData(JSON.parse(JSON.stringify(window.WEDDING_APP_DATA)));
  }
  let state = getStoredData();
  const contentFields = ['coupleName','date','venue','eyebrow','title','description','searchPlaceholder','searchButton','footer','resultLabel','notFoundTitle','notFoundText'];
  const themeFields = ['bg','surface','primary','primaryDark','text','border'];
  const docMap = { menuPdf: 'menu', drinksPdf: 'drinks', cocktailsPdf: 'cocktails' };

  function showStatus(message, type='ok') {
    const el = document.getElementById('status');
    el.className = 'status show ' + type;
    el.textContent = message;
    clearTimeout(showStatus._timer);
    showStatus._timer = setTimeout(() => { el.className = 'status'; }, 3200);
  }
  function escapeHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fillForm() {
    contentFields.forEach(id => document.getElementById(id).value = state.content[id] || '');
    themeFields.forEach(id => document.getElementById(id).value = state.theme[id] || '#ffffff');
    renderGuestRows();
    updateDocMeta();
    renderPreview();
  }
  function renderGuestRows() {
    const tbody = document.getElementById('guestRows');
    tbody.innerHTML = '';
    state.guests.forEach((guest, index) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input class="guest-name" type="text" value="${escapeHtml(guest.name || '')}" data-index="${index}" data-key="name"></td>
        <td><input class="guest-table" type="text" value="${escapeHtml(guest.table || '')}" data-index="${index}" data-key="table"></td>
        <td class="guest-actions"><button type="button" class="ghost" data-remove="${index}">Törlés</button></td>
      `;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', (e) => {
        const i = Number(e.target.dataset.index);
        const key = e.target.dataset.key;
        state.guests[i][key] = e.target.value;
      });
    });
    tbody.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.guests.splice(Number(btn.dataset.remove), 1);
        renderGuestRows();
      });
    });
  }
  function collectForm() {
    contentFields.forEach(id => state.content[id] = document.getElementById(id).value);
    themeFields.forEach(id => state.theme[id] = document.getElementById(id).value);
    state.guests = state.guests.filter(g => (g.name || '').trim() || (g.table || '').trim());
    return state;
  }
  function updateDocMeta() {
    ['menu','drinks','cocktails'].forEach(key => {
      const meta = document.getElementById(key + 'PdfMeta');
      const doc = state.documents[key];
      meta.textContent = doc.fileName ? `Feltöltve: ${doc.fileName}${doc.pageImages?.length ? ' (' + doc.pageImages.length + ' oldal képpé alakítva)' : ''}` : 'Nincs feltöltve.';
    });
  }
  async function pdfToPageImages(file) {
    const bytes = new Uint8Array(await file.arrayBuffer());
    const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    const images = [];
    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { alpha: false });
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      images.push(canvas.toDataURL('image/jpeg', 0.92));
    }
    return images;
  }
  async function handlePdfInput(inputId, key) {
    const input = document.getElementById(inputId);
    const file = input.files && input.files[0];
    if (!file) return;
    if (file.type !== 'application/pdf') {
      showStatus('Kérlek, PDF fájlt tölts fel.', 'warn');
      input.value = '';
      return;
    }
    try {
      showStatus('PDF feldolgozása folyamatban...');
      const pageImages = await pdfToPageImages(file);
      state.documents[key].fileName = file.name;
      state.documents[key].dataUrl = '';
      state.documents[key].pageImages = pageImages;
      updateDocMeta();
      renderPreview();
      showStatus('PDF feltöltve és mobilbarát képekké alakítva. Ne felejts el Mentést nyomni.');
    } catch (err) {
      console.error(err);
      showStatus('A PDF feldolgozása nem sikerült.', 'warn');
    }
    input.value = '';
  }
  function download(filename, text, mime) {
    const blob = new Blob([text], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
  }
  function buildDataJs(data) {
    return 'window.WEDDING_APP_DATA = ' + JSON.stringify(data, null, 2) + ';\n';
  }
  function guestTemplate(data) {
    const safeJson = JSON.stringify(data).replace(/</g, '\\u003c');
    return `<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esküvői információk</title>
<script>window.WEDDING_APP_DATA = ${safeJson};<\/script>
<style>
:root { --bg: #f7f0ea; --surface: #fffaf6; --primary: #b68663; --primary-dark: #94684a; --text: #3e3028; --border: #e8d7ca; }
* { box-sizing: border-box; }
body { margin: 0; font-family: Georgia, 'Times New Roman', serif; background: linear-gradient(180deg, var(--bg), #fbf7f3); color: var(--text); min-height: 100vh; padding: 24px; }
.shell { max-width: 1100px; margin: 0 auto; }
.card { width: 100%; background: rgba(255,250,246,0.96); border: 1px solid var(--border); border-radius: 28px; padding: 28px; box-shadow: 0 20px 60px rgba(90, 60, 40, 0.12); }
.eyebrow { letter-spacing: .18em; text-transform: uppercase; color: var(--primary-dark); font-size: 12px; margin-bottom: 12px; text-align:center; }
h1 { margin: 0 0 8px; font-size: 56px; line-height: 1.05; text-align:center; }
.meta, .desc { text-align:center; }
.meta { margin: 0 0 18px; opacity: .85; font-size: 24px; line-height: 1.35; }
.desc { margin: 0 0 24px; font-size: 18px; line-height: 1.6; color: var(--primary); }
.tabs { display:flex; gap:12px; flex-wrap:wrap; margin:0 0 22px; justify-content:center; }
.tab { border:1px solid var(--border); background:#fff; color:var(--text); border-radius:999px; padding:13px 20px; font-size:15px; font-weight:700; cursor:pointer; }
.tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.panel { display:none; }
.panel.active { display:block; }
.search { display:grid; grid-template-columns:1fr; gap:12px; max-width: 460px; margin: 0 auto; }
input { width:100%; border:1px solid var(--border); border-radius:16px; padding:16px 18px; font-size:18px; background:#fff; color:var(--text); outline:none; }
input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(182,134,99,.15); }
button.action { border:0; border-radius:16px; padding:16px 18px; font-size:18px; cursor:pointer; background:var(--primary); color:#fff; font-weight:700; }
button.action:hover { background:var(--primary-dark); }

.result.show { display:block; }
.result-label { font-size:13px; letter-spacing:.16em; text-transform:uppercase; color:var(--primary-dark); margin-bottom:8px; }

@media (max-width: 640px) {
  body { padding: 12px; }
  .card { padding: 18px; border-radius: 24px; }
  h1 { font-size: 28px; line-height: 1.08; }
  .meta { font-size: 16px; line-height: 1.25; }
  .desc { font-size: 16px; line-height: 1.5; }
  input, button.action { font-size: 16px; padding: 15px 16px; }
  .result-table { font-size: 40px; }
  .result-name { font-size: 16px; }
  .footer { font-size: 14px; }
  .doc-view { padding: 14px; border-radius: 22px; }
  .doc-view h2 { font-size: 28px; margin-bottom: 12px; }
  .doc-images { gap: 10px; }
  .doc-images img { border-radius: 14px; }

</style>

<body>
<div class="shell"><main class="card">
<div class="eyebrow" id="eyebrow"></div>
<h1 id="title"></h1>
<p class="meta"><span id="couple"></span> · <span id="date"></span> · <span id="venue"></span></p>
<p class="desc" id="description"></p>
<div class="tabs">
  <button class="tab active" type="button" data-tab="seating">Ültetési rend</button>
  <button class="tab" type="button" data-tab="menu">Menü</button>
  <button class="tab" type="button" data-tab="drinks">Itallap</button>
  <button class="tab" type="button" data-tab="cocktails">Koktéllap</button>
</div>
<section class="panel active" id="panel-seating">
  <div class="search"><input id="nameInput" type="text" autocomplete="name" /><button class="action" id="searchBtn" type="button"></button></div>
  <section class="result" id="result"></section>
</section>
<section class="panel" id="panel-menu"></section>
<section class="panel" id="panel-drinks"></section>
<section class="panel" id="panel-cocktails"></section>

</main></div>
<script>
function getDefaultDocuments(){ return { menu:{ title:'Menü', description:'', fileName:'', dataUrl:'', pageImages:[] }, drinks:{ title:'Itallap', description:'', fileName:'', dataUrl:'', pageImages:[] }, cocktails:{ title:'Koktéllap', description:'', fileName:'', dataUrl:'', pageImages:[] } }; }
function normalizeData(data){ if(!data.documents) data.documents = getDefaultDocuments(); const defs = getDefaultDocuments(); Object.keys(defs).forEach(key => { data.documents[key] = Object.assign({}, defs[key], data.documents[key] || {}); if(!Array.isArray(data.documents[key].pageImages)) data.documents[key].pageImages = []; }); return data; }
function getData(){ const local = localStorage.getItem('weddingSeatingDataV8'); if (local) { try { return normalizeData(JSON.parse(local)); } catch (e) {} } return normalizeData(window.WEDDING_APP_DATA); }
function normalize(text){ return (text || '').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' '); }
function escapeHtml(str){ return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function renderChrome(data){ const c=data.content,t=data.theme; document.documentElement.style.setProperty('--bg', t.bg); document.documentElement.style.setProperty('--surface', t.surface); document.documentElement.style.setProperty('--primary', t.primary); document.documentElement.style.setProperty('--primary-dark', t.primaryDark); document.documentElement.style.setProperty('--text', t.text); document.documentElement.style.setProperty('--border', t.border); document.getElementById('eyebrow').textContent=c.eyebrow||''; document.getElementById('title').textContent=c.title||''; document.getElementById('couple').textContent=c.coupleName||''; document.getElementById('date').textContent=c.date||''; document.getElementById('venue').textContent=c.venue||''; document.getElementById('description').textContent=c.description||''; document.getElementById('nameInput').placeholder=c.searchPlaceholder||'Név'; document.getElementById('searchBtn').textContent=c.searchButton||'Keresés'; document.getElementById('footer').textContent=c.footer||''; renderDocPanel('panel-menu', data.documents.menu); renderDocPanel('panel-drinks', data.documents.drinks); renderDocPanel('panel-cocktails', data.documents.cocktails); }
function renderDocPanel(id, doc){ const panel=document.getElementById(id); if(!doc || !doc.pageImages || !doc.pageImages.length){ panel.innerHTML = '<div class="doc-view"><h2>'+escapeHtml(doc?.title || '')+'</h2><div class="doc-empty">Feltöltés alatt.</div></div>'; return; } panel.innerHTML = '<div class="doc-view"><h2>'+escapeHtml(doc.title || '')+'</h2><div class="doc-images">'+doc.pageImages.map(src => '<img src="'+src+'" alt="'+escapeHtml(doc.title || 'Dokumentum oldal')+'">').join('')+'</div></div>'; }
function findGuest(guests,name){ const n=normalize(name); return guests.find(g=>normalize(g.name)===n); }
function showResult(data,guest){ const el=document.getElementById('result'); const c=data.content; if(guest){ el.innerHTML='<div class="result-label">'+(c.resultLabel||'Asztal')+'</div><div class="result-table">'+guest.table+'</div><div class="result-name">'+guest.name+'</div>'; } else { el.innerHTML='<div class="notfound-title">'+(c.notFoundTitle||'Nincs találat')+'</div><div>'+(c.notFoundText||'')+'</div>'; } el.classList.add('show'); }
function activateTab(tabName){ document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab===tabName)); document.querySelectorAll('.panel').forEach(panel => panel.classList.toggle('active', panel.id==='panel-'+tabName)); }
const data=getData(); renderChrome(data); document.getElementById('searchBtn').addEventListener('click',()=>{ const guest=findGuest(data.guests||[],document.getElementById('nameInput').value); showResult(data,guest); }); document.getElementById('nameInput').addEventListener('keydown',(e)=>{ if(e.key==='Enter') document.getElementById('searchBtn').click(); }); document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click',()=>activateTab(btn.dataset.tab)));
<\/script>
</body>

  }
  function renderPreview() {
    collectForm();
    document.getElementById('previewFrame').srcdoc = guestTemplate(state);
  }
  document.getElementById('saveBtn').addEventListener('click', () => {
    collectForm();
    localStorage.setItem('weddingSeatingDataV8', JSON.stringify(state));
    renderPreview();
    showStatus('Sikeresen mentve.');
  });
  document.getElementById('downloadDataBtn').addEventListener('click', () => {
    collectForm();
    download('data.js', buildDataJs(state), 'application/javascript;charset=utf-8');
    showStatus('A data.js letöltése elindult.');
  });
  document.getElementById('downloadGuestBtn').addEventListener('click', () => {
    collectForm();
    download('vendegoldal.html', guestTemplate(state), 'text/html;charset=utf-8');
    showStatus('A kész vendégoldal letöltése elindult.');
  });
  document.getElementById('addGuestBtn').addEventListener('click', () => {
    state.guests.push({ name: '', table: '' });
    renderGuestRows();
  });
  document.getElementById('loadSampleBtn').addEventListener('click', () => {
    if (!confirm('Biztosan visszaállítod a mintaadatokat? A jelenlegi admin adatok elvesznek.')) return;
    state = normalizeData(JSON.parse(JSON.stringify(DEFAULT_DATA)));
    localStorage.removeItem('weddingSeatingDataV8');
    fillForm();
    showStatus('Mintaadatok visszaállítva.', 'warn');
  });
  Object.entries(docMap).forEach(([inputId, key]) => {
    document.getElementById(inputId).addEventListener('change', () => handlePdfInput(inputId, key));
  });
  document.querySelectorAll('[data-clear-doc]').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.clearDoc;
      state.documents[key].fileName = '';
      state.documents[key].dataUrl = '';
      state.documents[key].pageImages = [];
      updateDocMeta();
      renderPreview();
      showStatus('Dokumentum törölve.', 'warn');
    });
  });
  [...contentFields, ...themeFields].forEach(id => {
    document.getElementById(id).addEventListener('input', renderPreview);
  });
  fillForm();
</script>
</body>
</html>
